<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Una Chispa de Magia ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap');

        /* --- VARIABLES DE DISEÑO --- */
        :root {
            --bg-oscuro: #060307;
            --fuente-titulo: 'Playfair Display', serif;
            --fuente-cuerpo: 'Plus Jakarta Sans', sans-serif;
            --color-oro: #f39c12;
            --color-rosa-magico: #ff477e;
            --color-cristal: rgba(255, 255, 255, 0.03);
            --borde-cristal: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-oscuro);
            /* Uso de dvh para mejor soporte en móviles */
            height: 100dvh;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: var(--fuente-cuerpo);
            position: relative;
            transition: background 3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body.encendido {
            background: radial-gradient(circle at 50% 40%, #3a001a 0%, #15000b 60%, #050004 100%);
        }

        /* --- CAPAS DE EFECTOS AMBIENTALES --- */
        .luz-ambiental {
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 3s ease;
            mix-blend-mode: screen;
        }
        body.encendido .luz-ambiental {
            opacity: 1;
        }

            flex-direction: column;
            align-items: center;
